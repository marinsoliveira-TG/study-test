name: test do bagui

on:
  push: 
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validacao-html:
    runs-on: ubuntu-latest
    steps: 
    - name: Baixar código
      uses: actions/checkout@v4

    - name: configurar Node.js (ambiente de linter)
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Instalar validador html
      run: npm install -g htmlhint

    - name: Validar arquivos html
      run: htmlhint "index.html"

jobs:
  validacao-html2:
    runs-on: ubuntu-latest
    steps: 
    - name: Baixar código
      uses: actions/checkout@v4

    - name: configurar Node.js (ambiente de linter)
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Instalar validador html
      run: npm install -g htmlhint

    - name: Validar arquivos html
      run: htmlhint "page2.html"

  # etapa de CD
  deploy-producao:
    needs: validacao-html
    runs-on: ubuntu-latest
    steps:
    - name: Baixar código
      uses: actions/checkout@v4

    - name: Configurar o Github pages
      uses: actions/configure-pages@v4

    - name: Compactar artefatos do Site
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Publicar no Github pages
      uses: actions/deploy-pages@v4
